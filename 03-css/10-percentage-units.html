<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10 - Percentage Units</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
    main {
        width: 100%;
        margin: 0 auto;
        section.percentage {
        margin: 0 auto;
        width: 80%;
        div.parent {
            display: flex;
            justify-content: center;
            align-items: center;
            div {
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 2rem;
                height: 50dvh;
                &.child1{
                    background-color: rgb(41, 41, 48);
                    width: 70%;
                }
                &.child2{
                    background-color: rgb(33, 20, 76);
                    width: 30%;
                }
            }
            height: 50dvh;
          }
        }
    }
</style>
</head>
<body>
    <main class="document-page"> 
        <a href="../03-css/index.html" class="boton-volver">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#000000" viewBox="0 0 256 256" >
                <path
                    d="M232,56A104.11,104.11,0,0,1,128,160H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L51.31,144H128a88.1,88.1,0,0,0,88-88,8,8,0,0,1,16,0Z">
                </path>
            </svg>
        </a>
        <header>
            <h1>10 - Percentage Units</h1>
            <h2>Are relative to the size of the parent element.</h2>
        </header>
        <section class="percentage">
            <div class="parent">
                <div class="child1">70%</div>
                <div class="child2">30%</div>

            </div>
           
        </section>
    </main>
