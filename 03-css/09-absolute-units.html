<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>02 - CSS File</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        li.abs1 {
            font-size: 0.5in;
        }
        li.abs2 {
            font-size: 1cm;
        }
        li.abs3 {
            font-size: 10mm;
        }
        li.abs4 {
            font-size: 10pt;
        }
        li.abs5 {
            font-size: 2pc;
        }
    </style>
</head>
<body>
    <main class="document-page"> 
        <a href="../03-css/index.html" class="boton-volver">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#000000" viewBox="0 0 256 256" >
                <path
                    d="M232,56A104.11,104.11,0,0,1,128,160H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L51.31,144H128a88.1,88.1,0,0,0,88-88,8,8,0,0,1,16,0Z">
                </path>
            </svg>
        </a>
        <header>
            <h1>09 - Absolute Units</h1>
            <h2>Specify a fixed length value. It doesn't matter if the screen's width or height changes.</h2>
            <ul>
                <li>Inch (in)</li>
                <li>Centimeter (cm)</li>
                <li>Millimeter (mm)</li>
                <li>Point (pt)</li>
                <li>Pica (pc)</li>
            </ul>
        </header>
        <section>
            <ul>
                <li class="abs1">Inch: 0.5in</li>
                <li class="abs2">Centimeter: 1cm</li>
                <li class="abs3">Millimeter: 10mm</li>
                <li class="abs4">Point: 10pt</li>
                <li class="abs5">Pica: 2pc</li>
            </ul>
        </section>
    </main>
