<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 - Sprite</title>

    <link rel="stylesheet" href="../src/css/03-css.css">

    <style>

       
        div#sprite {
            background: url(img/anim-sprite.png);
            height: 256px;
            width: 256px;
            margin: 1rem auto;
        }

        div#sprite.sp1 { background-position: calc(-256px * 0) 0; }
        div#sprite.sp2 { background-position: calc(-256px * 1) 0; }
        div#sprite.sp3 { background-position: calc(-256px * 2) 0; }
        div#sprite.sp4 { background-position: calc(-256px * 3) 0; }
        div#sprite.sp5 { background-position: calc(-256px * 4) 0; }
        div#sprite.sp6 { background-position: calc(-256px * 5) 0; }



      

        div#spiderman {
            background: url(img/spiderman.webp);
            background-repeat: no-repeat;

            width: 300px;
            height: 300px;

            margin: 2rem auto;

            image-rendering: pixelated;

            
            transition: background-position 0.08s linear;
        }

        
        div#spiderman.sm1 {
            background-position: 0px 0px;
        }

        div#spiderman.sm2 {
            background-position: -300px 0px;
        }

        div#spiderman.sm3 {
            background-position: -600px 0px;
        }

        div#spiderman.sm4 {
            background-position: -900px 0px;
        }

       
        div#spiderman.sm5 {
            background-position: 0px -300px;
        }

        div#spiderman.sm6 {
            background-position: -300px -300px;
        }

        div#spiderman.sm7 {
            background-position: -600px -300px;
        }

        
        div#spiderman.sm8 {
            background-position: 0px -600px;
        }

        div#spiderman.sm9 {
            background-position: -300px -600px;
        }

    </style>
</head>

<body>

    <main class="document-page">

        <a href="../03-css/index.html" class="boton-volver">
            <svg xmlns="http://www.w3.org/2000/svg"
                width="40"
                height="40"
                fill="#000000"
                viewBox="0 0 256 256">

                <path d="M232,56A104.11,104.11,0,0,1,128,160H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L51.31,144H128a88.1,88.1,0,0,0,88-88,8,8,0,0,1,16,0Z">
                </path>

            </svg>
        </a>

        <header>
            <h1>23 - Sprite</h1>
            <h2>An image sprite is a collection of images put into a single image.</h2>
        </header>

        <section>

            <h3>Runner:</h3>
            <div id="sprite" class="sp1"></div>

            <h3>Spiderman:</h3>
            <div id="spiderman" class="sm1"></div>

        </section>

    </main>



    <script>

   


        const sprite = document.getElementById('sprite');

        const numSprite = 6;

        let count = 1;

        setInterval(() => {

            sprite.className = `sp${count}`;

            count++;

            if(count > numSprite) {
                count = 1;
            }

        }, 80);



     

        const spiderman = document.getElementById('spiderman');

        const numSpider = 9;

        let spiderCount = 1;

        setInterval(() => {

            spiderman.className = `sm${spiderCount}`;

            spiderCount++;

            if(spiderCount > numSpider) {
                spiderCount = 1;
            }

        }, 185);

    </script>

</body>
</html>
