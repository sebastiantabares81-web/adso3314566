<head>

    <title>12 - Colors - Alpha</title>
    <link rel="stylesheet" href="../src/css/03-css.css">
    <style>
        figure.spiderman {
            background: url(../03-css/img/spiderman.png) no-repeat center/cover;
            border: 4px solid white;
            margin: 4rem auto;
            width: 400px;
            height: 400px;

            div {
                height: calc(400px / 3);
                &.box1 {
                    background-color: rgba(90, 37, 37, 0.5);
                }
                &.box2 {
                    background-color: rgba(12, 52, 70, 0.5);
                }
                &.box3 {
                    background-color: rgba(237, 228, 228, 0.5);
                }
            }
        }
    </style>

    <main class="document-page"> 
        <a href="../03-css/index.html" class="boton-volver">

            </svg>

        <header>

        <section>
            <h3>Example Transparent Colors: </h3>
