            <h2>Crea listas ordenadas y desordenadas</h2>

        <section>
            <h3>Unordered List (ul)</h3>
            <ul>
                <li>Python
                    <ul>
                        <li>Flask</li>
                        <li>Django</li>
                    </ul>
                </li>
                <li>Java</li>
                <li>JavaScript</li>

            <h3>Ordered List (ol)</h3>
            <ol type="I">
                <li>Jujutsu Kaisen
                    <ol type="a">
                        <li>Itadori</li>
                        <li>Gojo</li>
                        <li>Toji</li>
                    </ol>
