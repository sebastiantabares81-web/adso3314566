<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráficos y figuras</title>
    <link rel="stylesheet" href="../src/css/02-html.css">
    <style>
        .graphics-container {
            display: flex;
            flex-wrap: wrap;
            gap: 3rem;
            justify-content: center;
            padding: 2rem;
        }
        
        .graphic-item {
            text-align: center;
        }
        
        .graphic-item h3 {
            margin-bottom: 1rem;
            color: #333;
        }
        
        canvas, svg {
            display: block;
        }
    </style>
</head>
<body>
    <main class="document-page"> 
        <a href="../02-html/index.html" class="boton-volver">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#000000" viewBox="0 0 256 256" >
                <path d="M232,56A104.11,104.11,0,0,1,128,160H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48a8,8,0,0,1,11.32,11.32L51.31,144H128a88.1,88.1,0,0,0,88-88,8,8,0,0,1,16,0Z"></path>
            </svg>
        </a>
        <header>
            <h1>11- Graphics</h1>
            <h2>Gráficos en linea con etiquetas</h2>
        </header>
        <section>
            <div class="graphics-container">
                
                <!-- 1. Círculo SVG -->
                <div class="graphic-item">
                    <h3>Círculo</h3>
                    <svg width="150" height="150" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="75" cy="75" r="60" fill="#FF6B6B" stroke="#333" stroke-width="2"/>
                    </svg>
                </div>

                <!-- 2. Rectángulo SVG -->
                <div class="graphic-item">
                    <h3>Rectángulo</h3>
                    <svg width="150" height="150" xmlns="http://www.w3.org/2000/svg">
                        <rect x="25" y="25" width="100" height="100" fill="#4ECDC4" stroke="#333" stroke-width="2"/>
                    </svg>
                </div>

                <!-- 3. Estrella SVG -->
                <div class="graphic-item">
                    <h3>Estrella</h3>
                    <svg width="150" height="150" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="75,15 85,55 125,55 95,80 105,120 75,95 45,120 55,80 25,55 65,55" fill="#FFD700" stroke="#333" stroke-width="2"/>
                    </svg>
                </div>

                <!-- 4. Corazón SVG -->
                <div class="graphic-item">
                    <h3>Corazón</h3>
                    <svg width="150" height="150" xmlns="http://www.w3.org/2000/svg">
                        <path d="M75,120 C75,120 25,90 25,55 C25,35 40,20 55,20 C65,20 70,28 75,35 C80,28 85,20 95,20 C110,20 125,35 125,55 C125,90 75,120 75,120Z" fill="#FF1493" stroke="#333" stroke-width="2"/>
                    </svg>
                </div>

                <!-- 5. Gráfico de barras SVG -->
                <div class="graphic-item">
                    <h3>Gráfico de Barras</h3>
                    <svg width="200" height="150" xmlns="http://www.w3.org/2000/svg">
                        <rect x="20" y="90" width="30" height="40" fill="#4CAF50" stroke="#333" stroke-width="1"/>
                        <rect x="60" y="60" width="30" height="70" fill="#4CAF50" stroke="#333" stroke-width="1"/>
                        <rect x="100" y="30" width="30" height="100" fill="#4CAF50" stroke="#333" stroke-width="1"/>
                        <rect x="140" y="75" width="30" height="55" fill="#4CAF50" stroke="#333" stroke-width="1"/>
                        <line x1="10" y1="130" x2="180" y2="130" stroke="#333" stroke-width="2"/>
                        <line x1="20" y1="20" x2="20" y2="130" stroke="#333" stroke-width="2"/>
                    </svg>
                </div>

                <!-- 6. Óvalo Canvas -->
                <div class="graphic-item">
                    <h3>Óvalo</h3>
                    <canvas id="ovalCanvas" width="150" height="150"></canvas>
                </div>

                <!-- 7. Hexágono Canvas -->
                <div class="graphic-item">
                    <h3>Hexágono</h3>
                    <canvas id="hexagonoCanvas" width="150" height="150"></canvas>
                </div>

                <!-- 8. Gráfico de líneas Canvas -->
                <div class="graphic-item">
                    <h3>Gráfico de Líneas</h3>
                    <canvas id="lineChartCanvas" width="200" height="150"></canvas>
                </div>

            </div>
        </section>
    </main>

    <script>
        // Óvalo en Canvas
        const canvasOval = document.getElementById('ovalCanvas');
        const ctx1 = canvasOval.getContext('2d');
        canvasOval.width = 150;
        canvasOval.height = 150;
        ctx1.beginPath();
        ctx1.ellipse(75, 75, 50, 30, 0, 0, Math.PI * 2);
        ctx1.fillStyle = '#9B59B6';
        ctx1.fill();
        ctx1.strokeStyle = '#333';
        ctx1.stroke();

        // Hexágono en Canvas
        const canvasHex = document.getElementById('hexagonoCanvas');
        const ctx2 = canvasHex.getContext('2d');
        canvasHex.width = 150;
        canvasHex.height = 150;
        ctx2.beginPath();
        for (let i = 0; i < 6; i++) {
            let angle = (Math.PI * 2 * i) / 6 - Math.PI / 2;
            let x = 75 + 50 * Math.cos(angle);
            let y = 75 + 50 * Math.sin(angle);
            if (i === 0) ctx2.moveTo(x, y);
            else ctx2.lineTo(x, y);
        }
        ctx2.closePath();
        ctx2.fillStyle = '#E67E22';
        ctx2.fill();
        ctx2.strokeStyle = '#333';
        ctx2.stroke();

        // Gráfico de líneas en Canvas
        const canvasChart = document.getElementById('lineChartCanvas');
        const ctx3 = canvasChart.getContext('2d');
        canvasChart.width = 200;
        canvasChart.height = 150;
        
        // Fondo
        ctx3.fillStyle = '#f9f9f9';
        ctx3.fillRect(0, 0, 200, 150);
        
        // Dibujar línea
        ctx3.beginPath();
        ctx3.moveTo(20, 120);
        ctx3.lineTo(60, 80);
        ctx3.lineTo(100, 100);
        ctx3.lineTo(140, 50);
        ctx3.lineTo(180, 70);
        ctx3.strokeStyle = '#3498DB';
        ctx3.lineWidth = 3;
        ctx3.stroke();
        
        // Dibujar puntos
        const puntos = [[20,120], [60,80], [100,100], [140,50], [180,70]];
        puntos.forEach(punto => {
            ctx3.fillStyle = '#3498DB';
            ctx3.beginPath();
            ctx3.arc(punto[0], punto[1], 4, 0, Math.PI * 2);
            ctx3.fill();
            ctx3.fillStyle = 'white';
            ctx3.beginPath();
            ctx3.arc(punto[0], punto[1], 2, 0, Math.PI * 2);
            ctx3.fill();
        });
        
        // Ejes
        ctx3.beginPath();
        ctx3.moveTo(15, 10);
        ctx3.lineTo(15, 130);
        ctx3.lineTo(190, 130);
        ctx3.strokeStyle = '#333';
        ctx3.lineWidth = 1;
        ctx3.stroke();
    </script>
</body>
</html>
