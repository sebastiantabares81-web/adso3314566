        <header>

            <h2>Inserts JavaScript code</h2>

        <section>
            <h3>JavaScript</h3>
            <h4 class="user"></h4>
        </section>
    </main>

    <script>
        const user = document.querySelector(".user");
        const answer = prompt("What's your name?");

        if (answer) {
            user.textContent = "Bienvenido mi insano👻, " + answer + "!";
        } else {
            user.textContent = "🔒 Welcome... Guest.";
        }
    </script>
